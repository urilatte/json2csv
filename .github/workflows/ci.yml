name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black mypy pyright pytest pytest-cov bandit pdoc

    - name: Run Black (Format check)
      run: black --check src/ tests/

    - name: Run Ruff (PEP8 & PEP257)
      run: ruff check src/ tests/

    - name: Run MyPy (Static Type Check)
      run: mypy src/

    - name: Run PyRight (Static Type Check)
      run: npx pyright src/

    - name: Run Bandit (Security Scan)
      run: bandit -r src/ -ll

    - name: Run Tests with Pytest & Coverage (Min 85%)
      run: pytest -o pythonpath=src --cov=src --cov-fail-under=85
        
    - name: Generate Documentation (pdoc)
      run: |
        pdoc --html --output-dir docs src/json2csv